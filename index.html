<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国化学会2026年中西部无机化学化工学术研讨会</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(45deg, #2c3e50, #3498db);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 40px 30px;
        }

        .file-info {
            background: #f8f9fa;
            border-left: 4px solid #3498db;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 0 8px 8px 0;
        }

        .file-icon {
            display: inline-block;
            width: 50px;
            height: 50px;
            background: #e74c3c;
            border-radius: 8px;
            margin-right: 15px;
            position: relative;
            vertical-align: middle;
        }

        .file-icon::before {
            content: 'P';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-weight: bold;
            font-size: 20px;
        }

        .file-details {
            display: inline-block;
            vertical-align: middle;
        }

        .file-name {
            font-size: 1.3em;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .file-size {
            color: #7f8c8d;
            font-size: 0.9em;
        }

        .actions {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-download {
            background: linear-gradient(45deg, #27ae60, #2ecc71);
            color: white;
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
        }

        .btn-preview {
            background: linear-gradient(45deg, #3498db, #2980b9);
            color: white;
        }

        .btn-preview:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }

        .preview-container {
            margin-top: 30px;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            overflow: hidden;
            display: none;
        }

        .preview-header {
            background: #34495e;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .preview-content {
            padding: 20px;
            background: white;
            min-height: 400px;
            max-height: 600px;
            overflow-y: auto;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #e74c3c;
            color: white;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            display: none;
        }

        .features {
            background: #ecf0f1;
            padding: 25px;
            border-radius: 10px;
            margin-top: 30px;
        }

        .features h3 {
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .features ul {
            list-style: none;
            padding-left: 0;
        }

        .features li {
            padding: 8px 0;
            border-bottom: 1px solid #bdc3c7;
            display: flex;
            align-items: center;
        }

        .features li:before {
            content: "✓";
            color: #27ae60;
            font-weight: bold;
            margin-right: 10px;
        }

        .features li:last-child {
            border-bottom: none;
        }

        @media (max-width: 768px) {
            .container {
                margin: 10px;
                border-radius: 10px;
            }
            
            .header {
                padding: 30px 20px;
            }
            
            .header h1 {
                font-size: 1.8em;
            }
            
            .content {
                padding: 30px 20px;
            }
            
            .actions {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>中国化学会2026年中西部无机化学化工学术研讨会</h1>
            第一轮通知
        </div>
        
        <div class="content">
            <div class="file-info">
                <div class="file-icon"></div>
                <div class="file-details">
                    <div class="file-name">中国化学会2026年中西部无机化学化工学术研讨会（第一轮通知）.pdf</div>
                    <div class="file-size">PDF 文档 - 学术会议通知</div>
                </div>
            </div>
            
            <div class="actions">
                <button class="btn btn-download" onclick="downloadFile()">
                    📥 下载文件
                </button>
                <button class="btn btn-preview" onclick="previewFile()">
                    👁️ 预览文件
                </button>
            </div>
            
            <div class="error-message" id="errorMessage"></div>
            
            <div class="preview-container" id="previewContainer">
                <div class="preview-header">
                    <span>📄 文件预览</span>
                    <button class="btn" onclick="closePreview()" style="padding: 5px 15px; font-size: 0.9em;">关闭</button>
                </div>
                <div class="preview-content" id="previewContent">
                    <div class="loading">
                        <div class="spinner"></div>
                        正在加载预览...
                    </div>
                </div>
            </div>
            
            <div class="features">
                <h3>功能特性</h3>
                <ul>
                    <li>支持 PDF 文件在线预览</li>
                    <li>一键下载原始文件</li>
                    <li>响应式设计，适配移动设备</li>
                    <li>优雅的用户界面</li>
                    <li>加载状态提示</li>
                    <li>错误处理机制</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- 引入 PDF.js 库用于预览 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <script>
        // 设置 PDF.js 的 worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const fileName = '中国化学会2026年中西部无机化学化工学术研讨会（第一轮通知）.pdf';
        const fileUrl = './' + fileName; // 假设 PDF 文件与 HTML 在同一目录

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function downloadFile() {
            try {
                // 创建下载链接
                const link = document.createElement('a');
                link.href = fileUrl;
                link.download = fileName;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                // 可选：显示下载成功提示
                alert('文件开始下载！');
            } catch (error) {
                showError('下载失败：' + error.message);
            }
        }

        async function previewFile() {
            const previewContainer = document.getElementById('previewContainer');
            const previewContent = document.getElementById('previewContent');
            
            try {
                // 显示预览容器
                previewContainer.style.display = 'block';
                
                // 加载 PDF
                const loadingTask = pdfjsLib.getDocument(fileUrl);
                const pdf = await loadingTask.promise;
                
                // 清空加载提示
                previewContent.innerHTML = '';
                
                // 渲染第一页
                const page = await pdf.getPage(1);
                const scale = 1.5;
                const viewport = page.getViewport({ scale });
                
                // 创建 canvas
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                
                // 渲染页面到 canvas
                const renderContext = {
                    canvasContext: context,
                    viewport: viewport
                };
                
                await page.render(renderContext).promise;
                
                // 添加到预览区域
                previewContent.appendChild(canvas);
                
                // 如果有多页，添加导航
                if (pdf.numPages > 1) {
                    const pageInfo = document.createElement('p');
                    pageInfo.textContent = `第 1 页 / 共 ${pdf.numPages} 页`;
                    pageInfo.style.textAlign = 'center';
                    pageInfo.style.marginTop = '20px';
                    pageInfo.style.color = '#7f8c8d';
                    previewContent.appendChild(pageInfo);
                    
                    // 添加简单的翻页功能
                    const pageControls = document.createElement('div');
                    pageControls.style.textAlign = 'center';
                    pageControls.style.marginTop = '15px';
                    
                    const prevBtn = document.createElement('button');
                    prevBtn.textContent = '上一页';
                    prevBtn.className = 'btn';
                    prevBtn.style.marginRight = '10px';
                    prevBtn.disabled = true;
                    
                    const nextBtn = document.createElement('button');
                    nextBtn.textContent = '下一页';
                    nextBtn.className = 'btn';
                    nextBtn.style.marginLeft = '10px';
                    
                    let currentPage = 1;
                    
                    prevBtn.onclick = () => {
                        if (currentPage > 1) {
                            currentPage--;
                            renderPage(currentPage, pdf, previewContent, canvas, scale);
                            prevBtn.disabled = currentPage === 1;
                            nextBtn.disabled = currentPage === pdf.numPages;
                        }
                    };
                    
                    nextBtn.onclick = () => {
                        if (currentPage < pdf.numPages) {
                            currentPage++;
                            renderPage(currentPage, pdf, previewContent, canvas, scale);
                            prevBtn.disabled = currentPage === 1;
                            nextBtn.disabled = currentPage === pdf.numPages;
                        }
                    };
                    
                    pageControls.appendChild(prevBtn);
                    pageControls.appendChild(nextBtn);
                    previewContent.appendChild(pageControls);
                }
                
            } catch (error) {
                previewContent.innerHTML = `
                    <div style="text-align: center; color: #e74c3c; padding: 40px;">
                        <h3>预览失败</h3>
                        ${error.message}
                    </div>
                `;
                showError('预览失败：' + error.message);
            }
        }

        async function renderPage(pageNum, pdf, container, canvas, scale) {
            try {
                const page = await pdf.getPage(pageNum);
                const viewport = page.getViewport({ scale });
                
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                
                const context = canvas.getContext('2d');
                const renderContext = {
                    canvasContext: context,
                    viewport: viewport
                };
                
                await page.render(renderContext).promise;
                
                // 更新页面信息
                const pageInfo = container.querySelector('p');
                if (pageInfo) {
                    pageInfo.textContent = `第 ${pageNum} 页 / 共 ${pdf.numPages} 页`;
                }
                
            } catch (error) {
                container.innerHTML = `
                    <div style="text-align: center; color: #e74c3c; padding: 40px;">
                        页面加载错误
                    </div>
                `;
            }
        }

        function closePreview() {
            const previewContainer = document.getElementById('previewContainer');
            previewContainer.style.display = 'none';
        }

        // 页面加载完成后的初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('PDF 预览页面已加载');
            
            // 检查 PDF 文件是否存在
            fetch(fileUrl, { method: 'HEAD' })
                .then(response => {
                    if (!response.ok) {
                        showError('PDF 文件未找到，请确保文件已上传到正确路径');
                    }
                })
                .catch(error => {
                    showError('无法访问 PDF 文件：' + error.message);
                });
        });
    </script>
</body>
</html>
