<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国化学会2026年中西部无机化学化工学术研讨会 - 文件下载与预览</title>
    <style>
        /* 全局重置与基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        /* 按钮容器：居中+弹性布局 */
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap; /* 适配小屏幕 */
        }

        /* 通用按钮样式 */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        /* 下载按钮（绿色） */
        .btn-download {
            background-color: #28a745;
        }
        .btn-download:hover {
            background-color: #218838;
        }

        /* 预览按钮（蓝色） */
        .btn-preview {
            background-color: #007bff;
        }
        .btn-preview:hover {
            background-color: #0056b3;
        }

        /* 预览弹窗容器：占满剩余空间 */
        .preview-modal {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            width: 95%;
            max-width: 1200px;
            height: 70vh; /* 预览区域高度（可根据需求调整） */
            margin: 0 auto;
            display: none; /* 默认隐藏 */
            flex-direction: column;
            overflow: hidden;
        }

        /* 弹窗头部：标题+关闭按钮 */
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background-color: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 500;
        }

        .btn-close {
            background: #6c757d;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .btn-close:hover {
            background: #5a6268;
        }

        /* 预览内容区域：占满剩余高度，支持滚动 */
        .preview-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto; /* 内容超出时滚动 */
        }

        /* PDF 嵌入容器：自适应宽度和高度 */
        .pdf-embed {
            width: 100%;
            height: 100%;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        /* 加载状态：居中显示 */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            flex-direction: column;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- 按钮容器 -->
    <div class="btn-container">
        <button class="btn btn-download" onclick="downloadFile()">下载文件</button>
        <button class="btn btn-preview" onclick="openPreview()">预览文件</button>
    </div>

    <!-- 预览弹窗 -->
    <div class="preview-modal" id="previewModal">
        <div class="modal-header">
            <h2 class="modal-title">文件预览</h2>
            <button class="btn-close" onclick="closePreview()">关闭</button>
        </div>
        <div class="preview-content" id="previewContent">
            <div class="loading" id="loading">
                <div class="spinner"></div>
                正在加载预览...
            </div>
            <!-- PDF 嵌入区域（默认隐藏） -->
            <embed id="pdfEmbed" class="pdf-embed" style="display: none;" type="application/pdf" />
        </div>
    </div>

    <script>
        // 打开预览弹窗
        function openPreview() {
            const modal = document.getElementById('previewModal');
            const loading = document.getElementById('loading');
            const pdfEmbed = document.getElementById('pdfEmbed');
            
            modal.style.display = 'flex'; // 显示弹窗
            loading.style.display = 'flex'; // 显示加载状态
            pdfEmbed.style.display = 'none'; // 隐藏PDF（先加载）
            
            // 模拟加载延迟（实际项目中可删除，直接用真实PDF路径）
            setTimeout(() => {
                // 替换为你的PDF文件实际路径（相对仓库根目录）
                pdfEmbed.src = "中国化学会2026年中西部无机化学化工学术研讨会（第一轮通知）.pdf"; 
                loading.style.display = 'none'; // 隐藏加载状态
                pdfEmbed.style.display = 'block'; // 显示PDF
            }, 1500);
        }

        // 关闭预览弹窗
        function closePreview() {
            const modal = document.getElementById('previewModal');
            modal.style.display = 'none';
        }

        // 下载文件
        function downloadFile() {
            // 替换为你的PDF文件实际路径（相对仓库根目录）
            const fileUrl = "中国化学会2026年中西部无机化学化工学术研讨会（第一轮通知）.pdf";
            const a = document.createElement('a');
            a.href = fileUrl;
            a.download = "中国化学会2026年中西部无机化学化工学术研讨会（第一轮通知）.pdf";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
