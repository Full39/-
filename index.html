<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>研讨会PDF预览与下载</title>
    <style>
        /* 全局样式 */
        body {
            font-family: "Microsoft Yahei", sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* 容器卡片 */
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            padding: 30px;
            width: 90%;
            max-width: 1000px;
            margin-bottom: 20px;
        }
        /* 标题样式 */
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 24px;
            font-size: 24px;
        }
        /* 按钮组 */
        .btn-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 24px;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        .download-btn {
            background-color: #28a745;
            color: #fff;
        }
        .download-btn:hover {
            background-color: #218838;
        }
        .preview-btn {
            background-color: #007bff;
            color: #fff;
        }
        .preview-btn:hover {
            background-color: #0056b3;
        }
        /* PDF 容器（自适应高度） */
        .pdf-container {
            width: 100%;
            height: 600px;
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
        }
        embed {
            width: 100%;
            height: 100%;
            border: none;
        }
        /* 响应式：小屏幕下调整高度 */
        @media (max-width: 768px) {
            .pdf-container {
                height: 400px;
            }
            .btn {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>中国化学会2026年中西部无机化学化工学术研讨会</h1>
        
        <!-- 操作按钮：下载 + 预览 -->
        <div class="btn-group">
            <!-- 下载按钮（需确保PDF文件名正确） -->
            <a 
                href="中国化学会2026年中西部无机化学化工学术研讨会（第一轮通知）.pdf" 
                class="btn download-btn" 
                download="中国化学会2026年中西部无机化学化工学术研讨会（第一轮通知）.pdf"
            >
                下载PDF
            </a>
            
            <!-- 预览按钮（点击后嵌入PDF） -->
            <button class="btn preview-btn" onclick="previewPDF()">
                在线预览
           button>
      </   </div>

        <!-- PDF 预览区域（默认隐藏） -->
        <div class="pdf-container" id="pdfPreview" style="display: none;">
            <embed 
                id="pdfEmbed" 
                src="" 
                type="application/pdf" 
            />
        </div>
    </div>

    <script>
        // 预览PDF的函数：设置embed的src并显示容器
        function previewPDF() {
            const pdfPath = "中国化学会2026年中西部无机化学化工学术研讨会（第一轮通知）.pdf";
            document.getElementById("pdfEmbed").src = pdfPath;
            document.getElementById("pdfPreview").style.display = "block";
        }
    </script>
</body>
</html>
